                <div className="flex items-center gap-3">
                  <span className="w-11 h-11 rounded-full bg-gold/20 border border-gold/30 text-gold font-display font-bold text-sm flex items-center justify-center flex-shrink-0">
                    {s.n}
                  </span>
                  {i < STEPS.length - 1 && (
                    <div className="hidden sm:block h-px flex-1 bg-white/10"></div>
                  )}
                </div>
                <p className="font-semibold text-white text-sm">{s.title}</p>
                <p className="text-xs text-white/50 leading-relaxed">{s.desc}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ── TESTIMONIALS ── */}
      <section id="testimonials" className="max-w-5xl mx-auto px-6 py-16">
        <p className="text-xs font-medium text-gold tracking-widest uppercase mb-2">Testimonials</p>
        <h2 className="font-display text-3xl text-navy mb-8">What our clients say</h2>
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
          {TESTIMONIALS.map(t => (
            <div key={t.name} className="card-hover bg-white rounded-2xl border border-gray-200 p-5 flex flex-col gap-3">
              <Stars n={t.stars} />
              <p className="text-sm text-gray-500 leading-relaxed italic flex-1">"{t.text}"</p>
              <div className="flex items-center gap-3 pt-2 border-t border-gray-100">
                <div className="w-9 h-9 rounded-full bg-navy/10 text-navy text-xs font-bold flex items-center justify-center">
                  {t.initials}
                </div>
                <div>
                  <p className="text-sm font-medium text-navy">{t.name}</p>
                  <p className="text-xs text-gray-400">{t.role}</p>
                </div>
              </div>
            </div>
          ))}
        </div>
      </section>

      {/* ── CONTACT ── */}
      <ContactSection />

      {/* ── FINAL CTA ── */}
      <section className="max-w-5xl mx-auto px-6 py-16 text-center">
        <div className="bg-navy rounded-3xl p-10">
          <h2 className="font-display text-3xl text-white mb-3">Ready to get started?</h2>
          <p className="text-white/60 text-sm mb-8 max-w-md mx-auto">
            Send us your brief today. Free quote within 2 hours. No commitment required.
          </p>
          <div className="flex flex-wrap gap-3 justify-center">
            <a href={WHATSAPP} target="_blank" rel="noopener"
              className="inline-flex items-center gap-2 bg-gold text-white px-6 py-3 rounded-xl text-sm font-medium hover:bg-gold-dark transition-colors">
              <i className="ti ti-brand-whatsapp text-base" aria-hidden="true"></i>
              WhatsApp us now
            </a>
            <a href={EMAIL}
              className="inline-flex items-center gap-2 border border-white/20 text-white px-6 py-3 rounded-xl text-sm font-medium hover:bg-white/10 transition-colors">
              <i className="ti ti-mail text-base" aria-hidden="true"></i>
              Send an email
            </a>
          </div>
        </div>
      </section>

      {/* ── FOOTER ── */}
      <footer className="border-t border-gray-200 bg-parchment">
        <div className="max-w-5xl mx-auto px-6 py-8">
          <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-6">
            <div>
              <span className="font-display font-bold text-navy text-lg">Scholar<span className="text-gold">Pro</span></span>
              <p className="text-xs text-gray-400 mt-1 max-w-xs">
                Professional academic writing services for students and researchers worldwide.
              </p>
            </div>
            <div className="flex flex-col sm:flex-row gap-4 text-xs text-gray-400">
              {NAV.map(l => (
                <button key={l} onClick={() => scrollTo(l.toLowerCase())}
                  className="hover:text-navy transition-colors text-left">
                  {l}
                </button>
              ))}
            </div>
          </div>
          <div className="border-t border-gray-200 mt-6 pt-5 flex flex-col sm:flex-row items-center justify-between gap-2 text-xs text-gray-400">
            <span>© 2026 ScholarPro. All rights reserved.</span>
            <span className="flex items-center gap-1">
              <i className="ti ti-shield-check text-teal-500 text-sm" aria-hidden="true"></i>
              100% confidential · Plagiarism-free guarantee
            </span>
          </div>
        </div>
      </footer>

      {/* ── WHATSAPP FLOAT ── */}
      <a href={WHATSAPP} target="_blank" rel="noopener" className="wa-btn" aria-label="Chat on WhatsApp">
        <i className="ti ti-brand-whatsapp" aria-hidden="true"></i>
      </a>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
